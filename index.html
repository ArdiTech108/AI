<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Asistenti Akademik</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        #container { width: 90%; max-width: 600px; background: #1e293b; padding: 30px; border-radius: 20px; border: 1px solid #38bdf8; }
        #output { min-height: 150px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin: 20px 0; border-left: 4px solid #38bdf8; }
        button { padding: 15px; width: 100%; border-radius: 50px; border: none; background: #38bdf8; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div id="container">
    <h2>Asistenti i Klasës</h2>
    <div id="status">Shtyp butonin për të dëgjuar...</div>
    <div id="output">...</div>
    <button id="listenBtn">Aktivizo Dëgjimin</button>
</div>

<script>
    const btn = document.getElementById("listenBtn");
    const output = document.getElementById("output");
    const status = document.getElementById("status");

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'sq-AL';

    btn.onclick = () => { recognition.start(); status.innerText = "Po dëgjoj..."; };

    recognition.onresult = async (event) => {
        const pyetja = event.results[0][0].transcript;
        status.innerText = "Pyetja: " + pyetja;
        output.innerText = "Duke kërkuar...";

        const response = await fetch('/api/pyetje', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pyetja: pyetja })
        });

        const data = await response.json();
        if(data.candidates) {
            output.innerText = data.candidates[0].content.parts[0].text;
            status.innerText = "Gati.";
        } else {
            output.innerText = "Gabim: " + (data.error || "S'ka përgjigje");
        }
    };
</script>
</body>
</html>
